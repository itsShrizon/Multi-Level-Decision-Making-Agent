apiVersion: v1
kind: ConfigMap
metadata:
  name: mldm-agent-config
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_JSON: "true"
  HOST: "0.0.0.0"
  PORT: "8000"
  RATE_LIMIT: "100/minute"
  MAX_CONVERSATION_HISTORY: "500"
  LM_MAIN: "openai/gpt-4o"
  LM_FAST: "openai/gpt-4o-mini"
  LM_SUMMARY: "openai/gpt-3.5-turbo"
  LM_REPORT: "gemini/gemini-1.5-pro"
  LM_MAX_TOKENS: "1024"
  LM_TEMPERATURE: "0.0"
  LM_TIMEOUT_S: "30"
  ALLOWED_ORIGINS: '["https://app.example.com"]'
  ALLOWED_HOSTS: '["api.example.com"]'
