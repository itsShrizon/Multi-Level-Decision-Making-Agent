apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mldm-dev
namePrefix: dev-

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/instance: mldm-agent-dev
  env: dev

images:
  - name: mldm-agent
    newName: us-central1-docker.pkg.dev/PROJECT_ID/mldm/mldm-agent
    newTag: dev

replicas:
  - name: mldm-agent
    count: 1

patches:
  - path: configmap-dev.yaml
    target:
      kind: ConfigMap
      name: mldm-agent-config
