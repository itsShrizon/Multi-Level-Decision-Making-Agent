# Pull API keys + DB password from GCP Secret Manager into a K8s Secret
# named mldm-agent-secrets (the same name the base deployment's envFrom
# references). Requires the External Secrets Operator already installed
# on the cluster (helm repo: external-secrets/external-secrets).
#
# The ClusterSecretStore uses Workload Identity — no static creds.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: PROJECT_ID
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: mldm-prod
          serviceAccountRef:
            name: mldm-agent
            namespace: mldm-prod
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mldm-agent-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: mldm-agent-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: mldm-openai-api-key
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: mldm-gemini-api-key
    - secretKey: SENTRY_DSN
      remoteRef:
        key: mldm-sentry-dsn
